<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SUIT GAME KIYOWO</title>
</head>
<body>
    <nav>
        <div>
            <ul>
                <li><a href="final_nadya.html" class="hover:text-emerald-600">Home</a></li>
                <li><a href="bmiandtemperature.html" class="hover:text-emerald-600">About</a></li>
                <li><a href="game.html" class="hover:text-emerald-600">Game</a></li>
            </ul>
        </div>
    </nav>
    
    <h1>GAME SUIT ✊🏼✌🏼🖐🏼</h1>
    
    <div class="scoreboard">
        <p>Your Score: <span id="player-score">0</span></p>
        <p>Computer Score: <span id="computer-score">0</span></p>
    </div>

    <div class="choices" id="choice-container">
        <img src="batu.jpeg" alt="batu" onclick="playerChoice('batu')">
        <img src="gunting.jpeg" alt="gunting" onclick="playerChoice('gunting')">
        <img src="kertas.jpeg" alt="kertas" onclick="playerChoice('kertas')">
    </div>

    <div class="countdown" id="countdown"></div>

    <div class="result" id="result-container" style="display: none;">
        <div class="result-image">
            <div>
                <p>Kamu: </p>
                <img id="player-img" alt="">
            </div>
            <div>
                <p>Computer: </p>
                <img id="computer-img" alt="">
            </div>
        </div>

        <h2 id="game-result"></h2>
        <button onclick="resetGame()">Play Again</button>
    </div>
        
    <script src="gamescript.js"></script>
</body>
</html>
